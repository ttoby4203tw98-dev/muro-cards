<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>暮若商品庫</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4a2c3a">
<style>
  :root{
    --plum:#4a2c3a; --plum2:#6b3f52; --rose:#9c5c6e; --gold:#d6a680;
    --cream:#faf6f2; --ink:#372a30; --ink2:#8a7580; --line:#eee2da;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
  .top{background:linear-gradient(160deg,var(--plum),var(--plum2) 60%,var(--rose));color:#f6eee8;
    padding:calc(env(safe-area-inset-top,0px) + 26px) 20px 24px;border-radius:0 0 24px 24px;text-align:center;}
  .top h1{font-size:21px;font-weight:800;letter-spacing:3px;}
  .top h1 small{font-size:11px;letter-spacing:3px;opacity:.7;margin-left:8px;}
  .top p{font-size:13px;opacity:.85;margin-top:6px;}
  .wrap{max-width:520px;margin:0 auto;padding:16px 14px 40px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 18px rgba(74,44,58,.07);margin-top:14px;}
  .searchrow{display:flex;gap:8px;align-items:stretch;}
  #sku{flex:1;min-width:0;border:2px solid var(--plum2);border-radius:12px;padding:11px 10px;font-size:19px;font-weight:800;
    letter-spacing:2px;text-align:center;color:var(--plum);background:#fffdfb;}
  #sku:focus{outline:none;border-color:var(--rose);}
  #go{flex:0 0 auto;border:none;border-radius:12px;background:var(--plum2);color:#fff;font-size:16px;font-weight:800;
    letter-spacing:1px;padding:0 18px;cursor:pointer;white-space:nowrap;}
  #msg{margin-top:10px;font-size:14px;font-weight:700;text-align:center;border-radius:10px;padding:10px;display:none;}
  #msg.warn{display:block;background:#FCF3D7;color:#8a6a10;}
  #msg.bad{display:block;background:#FBE4E4;color:#A4344F;}
  .grp h2{font-size:15px;color:var(--plum2);letter-spacing:1px;margin-bottom:10px;}
  .rulerow{display:flex;flex-wrap:wrap;gap:8px;}
  .rulechip{display:inline-block;background:#FBF6EF;border:1px dashed var(--gold);border-radius:99px;
    padding:9px 18px;font-size:15px;font-weight:700;color:#9A6A1F;text-decoration:none;}
  footer{text-align:center;margin-top:22px;font-size:12px;color:#b9a8b0;line-height:2.2;}
  footer a{color:var(--rose);}
</style>
</head>
<body>

<div class="top">
  <h1>暮若商品庫<small>MURO</small></h1>
  <p>輸入 MURO 商品編號，直接開資訊卡</p>
</div>

<div class="wrap">
  <div class="card">
    <div class="searchrow">
      <input id="sku" type="text" inputmode="text" autocomplete="off" placeholder="例如 1001">
      <button id="go">開卡</button>
    </div>
    <div id="msg"></div>
  </div>

  <div class="card grp">
    <h2>📚 分類規則庫</h2>
    <div class="rulerow">
      <a class="rulechip" href="bra-rules.html">內衣</a>
      <a class="rulechip" href="panty-rules.html">內褲</a>
      <a class="rulechip" href="tops-rules.html">上衣</a>
      <a class="rulechip" href="bottoms-rules.html">下身</a>
      <a class="rulechip" href="shapewear-rules.html">塑身</a>
      <a class="rulechip" href="socks-rules.html">襪子</a>
    </div>
  </div>

  <footer>
    <a href="https://docs.google.com/spreadsheets/d/1WJcHeXKPIrPa95JcyditMIP1fNI-ot1GvJb096Ly-Qc/edit" target="_blank" rel="noopener">開啟完整商品庫試算表 ↗</a><br>
    <a href="team.html">← 回團隊首頁</a>
  </footer>
</div>

<script>
function showMsg(cls,t){var m=document.getElementById('msg');m.className=cls;m.textContent=t;}
function hideMsg(){var m=document.getElementById('msg');m.className='';m.style.display='none';}

function openSku(s){
  s=(s||'').trim().toUpperCase();
  if(!s){showMsg('warn','先輸入商品編號');return;}
  hideMsg();
  var url=s+'.html';
  showMsg('warn','查詢中…');
  fetch(url,{method:'HEAD'}).then(function(r){
    if(r.ok){location.href=url;}
    else{showMsg('bad','找不到編號 '+s+' 的資訊卡，確認一下編號有沒有打對');}
  }).catch(function(){showMsg('bad','查詢失敗，請確認網路後再試');});
}

document.getElementById('go').onclick=function(){openSku(document.getElementById('sku').value);};
document.getElementById('sku').addEventListener('keydown',function(e){if(e.key==='Enter')openSku(this.value);});
</script>
</body>
</html>
