<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>暮若物流</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4a2c3a">
<style>
  :root{
    --plum:#4a2c3a; --plum2:#6b3f52; --rose:#9c5c6e; --gold:#d6a680;
    --cream:#faf6f2; --ink:#372a30; --ink2:#8a7580; --line:#eee2da;
    --s0:#9aa0a6; --s1:#3D549E; --s2:#C77800; --s3:#148F62;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
  .top{background:linear-gradient(160deg,var(--plum),var(--plum2) 60%,var(--rose));color:#f6eee8;
    padding:calc(env(safe-area-inset-top,0px) + 26px) 20px 24px;border-radius:0 0 24px 24px;text-align:center;}
  .top h1{font-size:21px;font-weight:800;letter-spacing:3px;}
  .top h1 small{font-size:11px;letter-spacing:3px;opacity:.7;margin-left:8px;}
  .top p{font-size:13px;opacity:.85;margin-top:6px;}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 40px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 18px rgba(74,44,58,.07);margin-top:14px;}
  .searchrow{display:flex;gap:8px;}
  #q{flex:1;min-width:0;border:2px solid var(--plum2);border-radius:12px;padding:11px 12px;font-size:16px;font-weight:700;
    color:var(--plum);background:#fffdfb;}
  #q:focus{outline:none;border-color:var(--rose);}
  .addbtn{flex:0 0 auto;border:none;border-radius:12px;background:var(--plum2);color:#fff;font-size:15px;font-weight:800;
    padding:0 16px;cursor:pointer;white-space:nowrap;}
  .order{border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-top:12px;cursor:pointer;}
  .o-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .o-no{font-size:16px;font-weight:800;color:var(--plum);letter-spacing:.5px;}
  .o-item{font-size:13px;color:var(--ink2);flex:1;min-width:120px;}
  .o-badge{font-size:12px;font-weight:800;color:#fff;border-radius:99px;padding:3px 11px;white-space:nowrap;}
  .steps{display:flex;align-items:center;margin-top:11px;}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
  .dot{width:13px;height:13px;border-radius:50%;background:#e7dcd6;z-index:1;}
  .step.done .dot{background:var(--rose);}
  .step.now .dot{background:var(--plum2);box-shadow:0 0 0 4px rgba(107,63,82,.18);}
  .bar{position:absolute;top:6px;left:-50%;width:100%;height:3px;background:#e7dcd6;}
  .step:first-child .bar{display:none;}
  .step.done .bar,.step.now .bar{background:var(--rose);}
  .slabel{font-size:10.5px;color:var(--ink2);margin-top:6px;text-align:center;white-space:nowrap;}
  .step.now .slabel{color:var(--plum2);font-weight:800;}
  .o-meta{margin-top:9px;font-size:12px;color:var(--ink2);display:flex;gap:12px;flex-wrap:wrap;}
  .o-meta b{color:#146C48;}
  .empty{color:var(--ink2);font-size:14px;padding:8px 0;}
  /* 表單 */
  .overlay{position:fixed;inset:0;background:rgba(55,42,48,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .sheet-form{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:20px 18px calc(env(safe-area-inset-bottom,0px) + 20px);max-height:88vh;overflow-y:auto;}
  .sheet-form h4{font-size:16px;color:var(--plum2);margin-bottom:4px;letter-spacing:1px;}
  .flabel{font-size:12px;font-weight:800;color:var(--ink2);margin:12px 0 6px;}
  .sheet-form input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;background:#fffdfb;}
  .sheet-form input:focus{outline:none;border-color:var(--rose);}
  .optrow{display:flex;flex-wrap:wrap;gap:8px;}
  .opt{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);}
  .opt.on{border-color:var(--plum2);background:var(--plum2);color:#fff;}
  .form-actions{display:flex;gap:10px;margin-top:16px;}
  .form-actions button{flex:1;border-radius:12px;font-size:15px;font-weight:800;padding:13px 0;cursor:pointer;border:none;}
  .btn-ok{background:var(--plum2);color:#fff;}
  .btn-cancel{background:#f0e8e3;color:var(--ink2);}
  .fmsg{font-size:13px;font-weight:700;margin-top:8px;text-align:center;border-radius:8px;padding:8px;display:none;}
  .fmsg.good{display:block;background:#E6F4EC;color:#146C48;}
  .fmsg.warn{display:block;background:#FCF3D7;color:#8a6a10;}
  .fmsg.bad{display:block;background:#FBE4E4;color:#A4344F;}
  .status{font-size:11px;color:var(--ink2);text-align:center;margin-top:12px;}
  footer{text-align:center;margin-top:18px;font-size:12px;color:#b9a8b0;}
  footer a{color:var(--rose);}
</style>
</head>
<body>

<div class="top">
  <h1>暮若物流<small>MURO</small></h1>
  <p>輸入訂單編號，看貨到哪裡了</p>
</div>

<div class="wrap">
  <div class="card">
    <div class="searchrow">
      <input id="q" type="text" autocomplete="off" placeholder="輸入訂單編號搜尋（可打一部分）">
      <button class="addbtn" id="addBtn">＋ 新增</button>
    </div>
  </div>

  <div class="card">
    <div id="list" class="empty">載入中…</div>
  </div>

  <div class="status" id="status"></div>
  <footer><a href="team.html">← 回團隊首頁</a></footer>
</div>

<!-- 新增／更新表單 -->
<div class="overlay" id="overlay">
  <div class="sheet-form">
    <h4 id="ftitle">新增訂單</h4>
    <div class="flabel">訂單編號</div>
    <input id="fno" type="text" autocomplete="off" placeholder="物流後台的訂單編號">
    <div class="flabel">商品（可留空）</div>
    <input id="fitem" type="text" autocomplete="off" placeholder="例如 1021 冰絲背心 ×200">
    <div class="flabel">目前狀態</div>
    <div class="optrow" id="stRow"></div>
    <div class="flabel">袋號（出貨後填）</div>
    <input id="fbag" type="text" autocomplete="off" placeholder="例如 A123">
    <div class="flabel">備註（可留空）</div>
    <input id="fnote" type="text" autocomplete="off">
    <div class="fmsg" id="fmsg"></div>
    <div class="form-actions">
      <button class="btn-cancel" id="fcancel">取消</button>
      <button class="btn-ok" id="fok">儲存</button>
    </div>
  </div>
</div>

<script>
var SHEET_ID='1SsIRULQjX5dQJgnEzfijQuZV5lfJKHmwHy2CJvG_XwE';
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbxujluuIzHbqtxJJtssliT1bOiU8Q8J0NWhAbYJzGTueqUWaEKFhzraBMapcGLBq95QMg/exec';
var TOKEN='muro2026';
var CSV='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent('物流');

var STAGES=['廠商待出貨','廠商已出貨','商品到深圳倉','商品出貨了'];
var SCOLOR=['var(--s0)','var(--s1)','var(--s2)','var(--s3)'];
var orders=[]; // {no,item,st,bag,note,upd}
var fSt=null;

function parseCSV(text){
  var rows=[],row=[],cur='',q=false;
  for(var i=0;i<text.length;i++){var c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'||c==='\r'){if(cur!==''||row.length){row.push(cur);rows.push(row);row=[];cur='';}}
      else cur+=c;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}

function load(){
  fetch(CSV+'&t='+Math.floor(Math.random()*1e9)).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(t){
    var rows=parseCSV(t);orders=[];
    if(rows.length&&(rows[0][0]||'').indexOf('訂單')===-1){render();return;} // 分頁尚未建立
    for(var i=1;i<rows.length;i++){
      var no=(rows[i][0]||'').trim();if(!no)continue;
      orders.push({no:no,item:(rows[i][1]||'').trim(),st:(rows[i][2]||'').trim(),
        bag:(rows[i][3]||'').trim(),note:(rows[i][4]||'').trim(),upd:(rows[i][5]||'').trim()});
    }
    orders.reverse(); // 新的在上面
    render();
    document.getElementById('status').textContent='共 '+orders.length+' 筆訂單';
  }).catch(function(){
    document.getElementById('list').textContent='讀不到物流資料，稍後再試。';
  });
}

function stageIdx(st){var i=STAGES.indexOf(st);return i<0?0:i;}

function render(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  var el=document.getElementById('list');
  var list=orders.filter(function(o){
    if(!q)return true;
    return o.no.toLowerCase().indexOf(q)!==-1||o.item.toLowerCase().indexOf(q)!==-1||o.bag.toLowerCase().indexOf(q)!==-1;
  });
  if(!list.length){el.className='empty';
    el.textContent=orders.length?'找不到符合「'+q+'」的訂單':'還沒有訂單，按右上「＋ 新增」加入第一筆。';return;}
  el.className='';el.innerHTML='';
  list.forEach(function(o){
    var idx=stageIdx(o.st);
    var d=document.createElement('div');d.className='order';
    var steps=STAGES.map(function(s,i){
      var short=['待出貨','已出貨','深圳倉','出貨了'][i];
      return '<div class="step'+(i<idx?' done':'')+(i===idx?' now':'')+'"><div class="bar"></div><div class="dot"></div><div class="slabel">'+short+'</div></div>';
    }).join('');
    d.innerHTML='<div class="o-head"><span class="o-no">'+o.no+'</span>'+
      '<span class="o-item">'+(o.item||'')+'</span>'+
      '<span class="o-badge" style="background:'+SCOLOR[idx]+'">'+(o.st||STAGES[0])+'</span></div>'+
      '<div class="steps">'+steps+'</div>'+
      '<div class="o-meta">'+(o.bag?'<span>袋號 <b>'+o.bag+'</b></span>':'')+
      (o.upd?'<span>更新 '+o.upd+'</span>':'')+(o.note?'<span>'+o.note+'</span>':'')+'</div>';
    d.onclick=function(){openForm(o);};
    el.appendChild(d);
  });
}

function buildSt(){
  var r=document.getElementById('stRow');r.innerHTML='';
  STAGES.forEach(function(s){
    var b=document.createElement('button');b.className='opt'+(s===fSt?' on':'');b.textContent=s;
    b.onclick=function(){fSt=s;[].forEach.call(r.children,function(x){x.classList.remove('on');});b.classList.add('on');};
    r.appendChild(b);
  });
}
function openForm(o){
  fSt=o?o.st||STAGES[0]:STAGES[0];
  document.getElementById('ftitle').textContent=o?'更新訂單 '+o.no:'新增訂單';
  document.getElementById('fno').value=o?o.no:'';
  document.getElementById('fno').readOnly=!!o;
  document.getElementById('fitem').value=o?o.item:'';
  document.getElementById('fbag').value=o?o.bag:'';
  document.getElementById('fnote').value=o?o.note:'';
  var m=document.getElementById('fmsg');m.className='fmsg';m.style.display='none';
  buildSt();
  document.getElementById('overlay').classList.add('show');
}
function showFmsg(cls,t){var m=document.getElementById('fmsg');m.className='fmsg '+cls;m.textContent=t;}

document.getElementById('addBtn').onclick=function(){openForm(null);};
document.getElementById('fcancel').onclick=function(){document.getElementById('overlay').classList.remove('show');};
document.getElementById('overlay').onclick=function(e){if(e.target===this)this.classList.remove('show');};

document.getElementById('fok').onclick=function(){
  var no=document.getElementById('fno').value.trim();
  if(!no){showFmsg('warn','訂單編號一定要填');return;}
  var payload={token:TOKEN,action:'logi_save',no:no,
    item:document.getElementById('fitem').value.trim(),
    st:fSt||STAGES[0],
    bag:document.getElementById('fbag').value.trim(),
    note:document.getElementById('fnote').value.trim()};
  showFmsg('warn','儲存中…');
  fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(r){return r.text();})
  .then(function(t){
    if(t==='ok'||t==='updated'){
      showFmsg('good','✅ 已儲存');
      var found=false;
      orders.forEach(function(o){if(o.no===no){o.item=payload.item;o.st=payload.st;o.bag=payload.bag;o.note=payload.note;found=true;}});
      if(!found)orders.unshift({no:no,item:payload.item,st:payload.st,bag:payload.bag,note:payload.note,upd:''});
      render();
      setTimeout(function(){document.getElementById('overlay').classList.remove('show');},600);
    }else{showFmsg('bad','儲存失敗，請確認寫入服務已更新到 v5');}
  })
  .catch(function(){showFmsg('bad','連不上寫入服務，請確認網路');});
};

document.getElementById('q').addEventListener('input',render);
load();
setInterval(load,120000);
</script>
</body>
</html>
